services:
  - type: web
    name: order-to-cash-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_KEY_1
        sync: false
      - key: GROQ_KEY_2
        sync: false
      - key: GROQ_KEY_3
        sync: false
      - key: GROQ_KEY_4
        sync: false
      - key: GROQ_KEY_5
        sync: false
      - key: GROQ_KEY_6
        sync: false
      - key: GROQ_KEY_7
        sync: false
      - key: GROQ_KEY_8
        sync: false
      - key: GROQ_KEY_9
        sync: false
      - key: GROQ_KEY_10
        sync: false
      - key: GROQ_KEY_11
        sync: false